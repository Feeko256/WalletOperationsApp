spring.application.name=WalletOperationsApp
spring.datasource.url=jdbc:postgresql://postgres:5432/${POSTGRES_DB:testdb}
spring.datasource.username=${POSTGRES_USER:user}
spring.datasource.password=${POSTGRES_PASSWORD:pass}

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:migrations/changelog.xml

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

server.error.include-message=always